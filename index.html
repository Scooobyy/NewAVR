<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Furniture - Real Camera View</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        /* Camera video background */
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        /* Canvas for 3D objects (transparent background) */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 2;
            padding: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .furniture-btn {
            background: #4CAF50;
            color: white;
        }
        
        .clear-btn {
            background: #f44336;
            color: white;
        }
        
        .remove-btn {
            background: #ff9800;
            color: white;
        }
        
        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            padding: 10px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 2;
            text-align: center;
            backdrop-filter: blur(5px);
            pointer-events: none;
        }
        
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
        }
        
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }
        
        #crosshair::before {
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            transform: translateY(-50%);
        }
        
        #crosshair::after {
            top: 0;
            bottom: 0;
            left: 50%;
            width: 2px;
            transform: translateX(-50%);
        }
        
        .instruction {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            z-index: 3;
            animation: fadeOut 4s forwards;
            white-space: nowrap;
            font-size: 16px;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        
        @media (max-width: 600px) {
            button { padding: 8px 14px; font-size: 12px; }
            #status { font-size: 11px; }
        }
    </style>
</head>
<body>
    <!-- Video background (camera feed) -->
    <video id="video-background" autoplay playsinline muted></video>
    
    <div id="status">🎯 Starting camera... Point at floor and tap to place furniture</div>
    <div id="crosshair"></div>
    
    <div id="controls">
        <button class="furniture-btn" data-type="chair">🪑 Chair</button>
        <button class="furniture-btn" data-type="table">📦 Table</button>
        <button class="furniture-btn" data-type="lamp">💡 Lamp</button>
        <button class="remove-btn" id="removeLast">🗑️ Remove</button>
        <button class="clear-btn" id="clearAll">🚮 Clear All</button>
    </div>
    
    <div class="instruction">
        📱 CAMERA ACTIVE!<br>
        👆 Tap on the FLOOR to place furniture<br>
        🪑 Furniture will appear in your REAL world!
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // --- Setup ---
        const scene = new THREE.Scene();
        
        // Camera - matches video aspect ratio
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 2);
        
        // Renderer with transparent background
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0); // Transparent
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // --- Camera Feed Setup ---
        const videoElement = document.getElementById('video-background');
        
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: 'environment' } } // Back camera
                });
                videoElement.srcObject = stream;
                await videoElement.play();
                console.log('Camera started');
                document.getElementById('status').innerHTML = '✅ Camera ready! Point at floor and tap to place furniture';
            } catch (err) {
                // Try with any camera if back camera fails
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    videoElement.srcObject = stream;
                    await videoElement.play();
                    document.getElementById('status').innerHTML = '✅ Camera ready! (front camera)';
                } catch (err2) {
                    console.error('Camera error:', err2);
                    document.getElementById('status').innerHTML = '❌ Camera access denied. Please allow camera permissions.';
                }
            }
        }
        
        startCamera();
        
        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(1, 2, 1);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x88aaff, 0.4);
        fillLight.position.set(0, 1, 0);
        scene.add(fillLight);
        
        // --- Furniture Models ---
        function createChair(x, z, color = 0xCD7F32) {
            const group = new THREE.Group();
            
            // Seat
            const seat = new THREE.Mesh(
                new THREE.BoxGeometry(0.55, 0.12, 0.55),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 })
            );
            seat.position.y = 0.06;
            seat.castShadow = true;
            group.add(seat);
            
            // Back
            const back = new THREE.Mesh(
                new THREE.BoxGeometry(0.55, 0.45, 0.1),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 })
            );
            back.position.set(0, 0.28, -0.28);
            back.castShadow = true;
            group.add(back);
            
            // Legs
            const legMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            [[-0.23, -0.03, -0.23], [0.23, -0.03, -0.23], [-0.23, -0.03, 0.23], [0.23, -0.03, 0.23]].forEach(pos => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.18, 6), legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                group.add(leg);
            });
            
            group.position.set(x, 0, z);
            return group;
        }
        
        function createTable(x, z, color = 0xC19A6B) {
            const group = new THREE.Group();
            
            const top = new THREE.Mesh(
                new THREE.BoxGeometry(0.75, 0.1, 0.75),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 })
            );
            top.position.y = 0.4;
            top.castShadow = true;
            group.add(top);
            
            const legMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            [[-0.32, 0.2, -0.32], [0.32, 0.2, -0.32], [-0.32, 0.2, 0.32], [0.32, 0.2, 0.32]].forEach(pos => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.4, 6), legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                group.add(leg);
            });
            
            group.position.set(x, 0, z);
            return group;
        }
        
        function createLamp(x, z, color = 0xFFD966) {
            const group = new THREE.Group();
            
            const base = new THREE.Mesh(
                new THREE.CylinderGeometry(0.2, 0.25, 0.1, 8),
                new THREE.MeshStandardMaterial({ color: 0xCCAA77, metalness: 0.5 })
            );
            base.position.y = 0.05;
            base.castShadow = true;
            group.add(base);
            
            const pole = new THREE.Mesh(
                new THREE.CylinderGeometry(0.07, 0.07, 0.55, 6),
                new THREE.MeshStandardMaterial({ color: 0xAA8866, metalness: 0.4 })
            );
            pole.position.y = 0.33;
            pole.castShadow = true;
            group.add(pole);
            
            const bulb = new THREE.Mesh(
                new THREE.SphereGeometry(0.13, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xFFAA66, emissive: 0xFF6600, emissiveIntensity: 0.5 })
            );
            bulb.position.y = 0.62;
            bulb.castShadow = true;
            group.add(bulb);
            
            group.position.set(x, 0, z);
            return group;
        }
        
        // Store furniture
        let furnitureItems = [];
        let currentType = 'chair';
        
        // Ground plane for placement (y = 0)
        const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        
        function getPlacementPosition() {
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            
            const point = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(groundPlane, point)) {
                const dist = camera.position.distanceTo(point);
                if (dist > 0.4 && dist < 4) {
                    return point;
                }
            }
            return null;
        }
        
        function addFurniture(position) {
            if (!position) return;
            
            let furniture;
            switch(currentType) {
                case 'chair': furniture = createChair(position.x, position.z); break;
                case 'table': furniture = createTable(position.x, position.z); break;
                case 'lamp': furniture = createLamp(position.x, position.z); break;
                default: furniture = createChair(position.x, position.z);
            }
            
            scene.add(furniture);
            furnitureItems.push({ mesh: furniture, type: currentType, pos: position.clone() });
            
            document.getElementById('status').innerHTML = `✅ ${currentType.toUpperCase()} placed! (${furnitureItems.length} items)`;
            setTimeout(() => {
                document.getElementById('status').innerHTML = `🎯 Tap on floor to place ${currentType} • ${furnitureItems.length} items`;
            }, 2000);
        }
        
        // Tap handler
        function onTap(event) {
            if (event.target.closest('button')) return;
            
            const pos = getPlacementPosition();
            if (pos) {
                addFurniture(pos);
            } else {
                document.getElementById('status').innerHTML = `❌ Point camera at FLOOR! (0.5-4m away)`;
                setTimeout(() => {
                    document.getElementById('status').innerHTML = `🎯 Center crosshair on floor and tap`;
                }, 1500);
            }
        }
        
        // Event listeners
        renderer.domElement.addEventListener('click', onTap);
        renderer.domElement.addEventListener('touchstart', onTap, { passive: false });
        
        // Button handlers
        document.querySelectorAll('.furniture-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                currentType = btn.dataset.type;
                document.querySelectorAll('.furniture-btn').forEach(b => b.style.opacity = '0.6');
                btn.style.opacity = '1';
                document.getElementById('status').innerHTML = `✨ Selected: ${currentType.toUpperCase()} • Tap on floor`;
            });
        });
        
        document.getElementById('removeLast').addEventListener('click', (e) => {
            e.stopPropagation();
            if (furnitureItems.length === 0) return;
            const last = furnitureItems.pop();
            scene.remove(last.mesh);
            document.getElementById('status').innerHTML = `🗑️ Removed ${last.type}`;
        });
        
        document.getElementById('clearAll').addEventListener('click', (e) => {
            e.stopPropagation();
            furnitureItems.forEach(item => scene.remove(item.mesh));
            furnitureItems = [];
            document.getElementById('status').innerHTML = `🧹 All cleared!`;
        });
        
        // Simple device orientation for AR movement
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                if (e.gamma !== null && e.beta !== null) {
                    const gamma = Math.min(Math.max(e.gamma, -60), 60);
                    const beta = Math.min(Math.max(e.beta, -60), 60);
                    camera.rotation.order = 'YXZ';
                    camera.rotation.y = (gamma / 180) * Math.PI;
                    camera.rotation.x = (beta / 180) * Math.PI;
                }
            });
        }
        
        // Animation
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
        
        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Add demo furniture
        setTimeout(() => {
            if (furnitureItems.length === 0) {
                const demoChair = createChair(0, 0.6, 0xCD7F32);
                scene.add(demoChair);
                furnitureItems.push({ mesh: demoChair, type: 'chair', pos: new THREE.Vector3(0, 0, 0.6) });
                document.getElementById('status').innerHTML = `🎯 Demo chair placed! Tap floor to add more`;
            }
        }, 2000);
        
        console.log('AR App Ready - Camera should be visible behind 3D objects');
    </script>
</body>
</html>
