<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Furniture - VISIBLE Version</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 2;
            padding: 12px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .furniture-btn {
            background: #4CAF50;
            color: white;
        }
        
        .clear-btn {
            background: #f44336;
            color: white;
        }
        
        .remove-btn {
            background: #ff9800;
            color: white;
        }
        
        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            color: #ffd700;
            padding: 12px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 2;
            text-align: center;
            backdrop-filter: blur(5px);
            pointer-events: none;
            font-weight: bold;
        }
        
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            transform: translate(-50%, -50%);
            border: 3px solid #ffd700;
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            background: rgba(255,215,0,0.2);
            box-shadow: 0 0 0 2px rgba(0,0,0,0.5);
        }
        
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: #ffd700;
        }
        
        #crosshair::before {
            top: 50%;
            left: 10%;
            right: 10%;
            height: 2px;
            transform: translateY(-50%);
        }
        
        #crosshair::after {
            top: 10%;
            bottom: 10%;
            left: 50%;
            width: 2px;
            transform: translateX(-50%);
        }
        
        .instruction {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            z-index: 3;
            animation: fadeOut 4s forwards;
            font-size: 16px;
            white-space: nowrap;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        
        @media (max-width: 600px) {
            button { padding: 8px 14px; font-size: 12px; }
            #status { font-size: 11px; top: 10px; }
        }
        
        .debug-info {
            position: fixed;
            bottom: 100px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 10px;
            font-family: monospace;
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <video id="video-background" autoplay playsinline muted></video>
    
    <div id="status">🎯 Starting AR... Please allow camera access</div>
    <div id="crosshair"></div>
    <div class="debug-info" id="debug">📍 Initializing...</div>
    
    <div id="controls">
        <button class="furniture-btn" data-type="chair">🪑 Chair</button>
        <button class="furniture-btn" data-type="table">📦 Table</button>
        <button class="furniture-btn" data-type="lamp">💡 Lamp</button>
        <button class="remove-btn" id="removeLast">🗑️ Remove</button>
        <button class="clear-btn" id="clearAll">🚮 Clear All</button>
    </div>
    
    <div class="instruction">
        📱 CAMERA ACTIVE!<br>
        👆 TAP anywhere to place furniture<br>
        🪑 Furniture will appear 2 meters in FRONT of you
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // --- Setup Scene ---
        const scene = new THREE.Scene();
        
        // Camera for 3D objects
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Start camera at origin, we'll move it based on device orientation
        camera.position.set(0, 1.6, 0);
        
        // Renderer with transparent background
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // --- Camera Feed ---
        const videoElement = document.getElementById('video-background');
        
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: 'environment' } }
                });
                videoElement.srcObject = stream;
                await videoElement.play();
                document.getElementById('status').innerHTML = '✅ Camera ready! TAP anywhere to place furniture in front of you';
                document.getElementById('debug').innerHTML = '✅ Camera active | Back camera';
            } catch (err) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    videoElement.srcObject = stream;
                    await videoElement.play();
                    document.getElementById('status').innerHTML = '✅ Camera ready! (front camera)';
                    document.getElementById('debug').innerHTML = '✅ Camera active | Front camera';
                } catch (err2) {
                    document.getElementById('status').innerHTML = '❌ Camera access denied';
                    document.getElementById('debug').innerHTML = '❌ Camera error';
                }
            }
        }
        
        startCamera();
        
        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 3, 2);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const fillLight = new THREE.PointLight(0x88aaff, 0.4);
        fillLight.position.set(0, 1, 0);
        scene.add(fillLight);
        
        // Add a simple helper to show where furniture will appear (invisible but helpful for debug)
        const helperSphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.1, 8, 8),
            new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000 })
        );
        helperSphere.visible = false;
        scene.add(helperSphere);
        
        // --- Furniture Models (Bold and Visible) ---
        function createChair(x, z, color = 0xCD7F32) {
            const group = new THREE.Group();
            
            // Seat (with bright color)
            const seatMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.1 });
            const seat = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.12, 0.6), seatMat);
            seat.position.y = 0.06;
            seat.castShadow = true;
            seat.receiveShadow = true;
            group.add(seat);
            
            // Backrest
            const back = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.1), seatMat);
            back.position.set(0, 0.3, -0.3);
            back.castShadow = true;
            group.add(back);
            
            // Legs (dark brown)
            const legMat = new THREE.MeshStandardMaterial({ color: 0x5D3A1A });
            const legPositions = [[-0.25, -0.02, -0.25], [0.25, -0.02, -0.25], [-0.25, -0.02, 0.25], [0.25, -0.02, 0.25]];
            legPositions.forEach(pos => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.2, 6), legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                group.add(leg);
            });
            
            group.position.set(x, 0, z);
            return group;
        }
        
        function createTable(x, z, color = 0xC19A6B) {
            const group = new THREE.Group();
            
            const topMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.2 });
            const top = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.8), topMat);
            top.position.y = 0.4;
            top.castShadow = true;
            group.add(top);
            
            const legMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            const legPositions = [[-0.35, 0.2, -0.35], [0.35, 0.2, -0.35], [-0.35, 0.2, 0.35], [0.35, 0.2, 0.35]];
            legPositions.forEach(pos => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.4, 6), legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                group.add(leg);
            });
            
            group.position.set(x, 0, z);
            return group;
        }
        
        function createLamp(x, z, color = 0xFFAA66) {
            const group = new THREE.Group();
            
            const baseMat = new THREE.MeshStandardMaterial({ color: 0xCCAA77, metalness: 0.6 });
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.26, 0.1, 8), baseMat);
            base.position.y = 0.05;
            base.castShadow = true;
            group.add(base);
            
            const poleMat = new THREE.MeshStandardMaterial({ color: 0xAA8866, metalness: 0.5 });
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6, 6), poleMat);
            pole.position.y = 0.35;
            pole.castShadow = true;
            group.add(pole);
            
            const bulbMat = new THREE.MeshStandardMaterial({ color: 0xFFDD88, emissive: 0xFF8800, emissiveIntensity: 0.7 });
            const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.14, 16, 16), bulbMat);
            bulb.position.y = 0.68;
            bulb.castShadow = true;
            group.add(bulb);
            
            group.position.set(x, 0, z);
            return group;
        }
        
        // Store furniture
        let furnitureItems = [];
        let currentType = 'chair';
        
        // --- CRITICAL: Place furniture directly in front of camera ---
        function getPlacementPosition() {
            // Get camera's forward direction
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyQuaternion(camera.quaternion);
            
            // Place at 2 meters in front of camera
            const distance = 2.0;
            const position = camera.position.clone().add(forward.multiplyScalar(distance));
            position.y = 0; // Ground level
            
            return position;
        }
        
        function addFurniture() {
            const position = getPlacementPosition();
            
            // Debug: Log placement info
            document.getElementById('debug').innerHTML = `📍 Placing at: X:${position.x.toFixed(1)} Z:${position.z.toFixed(1)} | Camera facing: ${camera.rotation.y.toFixed(2)}rad`;
            
            let furniture;
            switch(currentType) {
                case 'chair':
                    furniture = createChair(position.x, position.z, 0xCD7F32);
                    break;
                case 'table':
                    furniture = createTable(position.x, position.z, 0xC19A6B);
                    break;
                case 'lamp':
                    furniture = createLamp(position.x, position.z, 0xFFAA66);
                    break;
                default:
                    furniture = createChair(position.x, position.z);
            }
            
            scene.add(furniture);
            
            // Add a glowing outline effect (simple ring at base)
            const ringGeo = new THREE.RingGeometry(0.35, 0.45, 16);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff4400, emissiveIntensity: 0.5, side: THREE.DoubleSide });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = 0.01;
            furniture.add(ring);
            
            furnitureItems.push({
                mesh: furniture,
                type: currentType,
                position: position.clone()
            });
            
            // Visual feedback
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `✅ ${currentType.toUpperCase()} placed 2 meters in front! (${furnitureItems.length} items total)`;
            statusDiv.style.background = 'rgba(76,175,80,0.9)';
            setTimeout(() => {
                statusDiv.style.background = 'rgba(0,0,0,0.85)';
                statusDiv.innerHTML = `🎯 TAP to place more furniture • ${furnitureItems.length} items`;
            }, 2500);
            
            // Flash crosshair
            const crosshair = document.getElementById('crosshair');
            crosshair.style.border = '3px solid #4CAF50';
            crosshair.style.backgroundColor = 'rgba(76,175,80,0.4)';
            crosshair.style.transform = 'translate(-50%, -50%) scale(1.2)';
            setTimeout(() => {
                crosshair.style.border = '3px solid #ffd700';
                crosshair.style.backgroundColor = 'rgba(255,215,0,0.2)';
                crosshair.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 200);
        }
        
        // --- Tap Handler ---
        function onTap(event) {
            // Don't place if tapping on buttons
            if (event.target && (event.target.tagName === 'BUTTON' || event.target.closest('button'))) {
                return;
            }
            
            addFurniture();
        }
        
        // Event listeners
        renderer.domElement.addEventListener('click', onTap);
        renderer.domElement.addEventListener('touchstart', onTap, { passive: false });
        
        // Button controls
        document.querySelectorAll('.furniture-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                currentType = btn.dataset.type;
                document.querySelectorAll('.furniture-btn').forEach(b => b.style.opacity = '0.6');
                btn.style.opacity = '1';
                document.getElementById('status').innerHTML = `✨ Selected: ${currentType.toUpperCase()} • TAP to place in front`;
                setTimeout(() => {
                    if (document.getElementById('status').innerHTML.includes('Selected')) {
                        document.getElementById('status').innerHTML = `🎯 TAP to place ${currentType} • ${furnitureItems.length} items`;
                    }
                }, 1500);
            });
        });
        
        document.getElementById('removeLast').addEventListener('click', (e) => {
            e.stopPropagation();
            if (furnitureItems.length === 0) return;
            const last = furnitureItems.pop();
            scene.remove(last.mesh);
            document.getElementById('status').innerHTML = `🗑️ Removed last ${last.type} • ${furnitureItems.length} left`;
        });
        
        document.getElementById('clearAll').addEventListener('click', (e) => {
            e.stopPropagation();
            furnitureItems.forEach(item => scene.remove(item.mesh));
            furnitureItems = [];
            document.getElementById('status').innerHTML = `🧹 All furniture cleared!`;
        });
        
        // --- Device Orientation for looking around ---
        let hasOrientation = false;
        
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (event) => {
                if (event.gamma !== null && event.beta !== null) {
                    hasOrientation = true;
                    // Gamma: left/right rotation (-90 to 90)
                    // Beta: up/down rotation (-90 to 90)
                    const gamma = Math.min(Math.max(event.gamma, -80), 80);
                    const beta = Math.min(Math.max(event.beta, -80), 80);
                    
                    // Apply rotation to camera
                    camera.rotation.order = 'YXZ';
                    camera.rotation.y = (gamma / 180) * Math.PI;
                    camera.rotation.x = (beta / 180) * Math.PI;
                    
                    document.getElementById('debug').innerHTML = `🎯 Look around! Angle: ${Math.round(gamma)}° | ${furnitureItems.length} items`;
                }
            });
        }
        
        // Fallback: allow mouse drag on desktop for testing
        let isDragging = false;
        let lastX = 0;
        renderer.domElement.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isDragging = true;
                lastX = e.clientX;
            }
        });
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const delta = (e.clientX - lastX) * 0.01;
                camera.rotation.y += delta;
                lastX = e.clientX;
            }
        });
        window.addEventListener('mouseup', () => { isDragging = false; });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // --- Auto-place demo furniture after 3 seconds ---
        setTimeout(() => {
            if (furnitureItems.length === 0) {
                // Place a demo chair at 1.8m in front
                const forward = new THREE.Vector3(0, 0, -1);
                forward.applyQuaternion(camera.quaternion);
                const demoPos = camera.position.clone().add(forward.multiplyScalar(1.8));
                demoPos.y = 0;
                
                const demoChair = createChair(demoPos.x, demoPos.z, 0xCD7F32);
                scene.add(demoChair);
                
                // Add ring
                const ringGeo = new THREE.RingGeometry(0.35, 0.45, 16);
                const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff4400, emissiveIntensity: 0.5, side: THREE.DoubleSide });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = -Math.PI / 2;
                ring.position.y = 0.01;
                demoChair.add(ring);
                
                furnitureItems.push({
                    mesh: demoChair,
                    type: 'chair',
                    position: demoPos.clone()
                });
                
                document.getElementById('status').innerHTML = `🎉 DEMO CHAIR PLACED! Look around and TAP to add more!`;
                document.getElementById('status').style.background = 'rgba(76,175,80,0.9)';
                document.getElementById('debug').innerHTML = `✅ Demo chair at ${demoPos.x.toFixed(1)}, ${demoPos.z.toFixed(1)}`;
                
                setTimeout(() => {
                    document.getElementById('status').style.background = 'rgba(0,0,0,0.85)';
                    document.getElementById('status').innerHTML = `🎯 TAP anywhere to place ${currentType} • ${furnitureItems.length} items`;
                }, 4000);
            }
        }, 2000);
        
        console.log('AR App Ready - Furniture will appear 2 meters in front of camera!');
        console.log('Camera position:', camera.position);
        console.log('Camera rotation:', camera.rotation);
    </script>
</body>
</html>
