<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Furniture - Working Version</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 2;
            padding: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .furniture-btn {
            background: #4CAF50;
            color: white;
        }
        
        .clear-btn {
            background: #f44336;
            color: white;
        }
        
        .remove-btn {
            background: #ff9800;
            color: white;
        }
        
        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #ffd700;
            padding: 12px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 2;
            text-align: center;
            backdrop-filter: blur(5px);
            pointer-events: none;
            font-weight: bold;
        }
        
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            background: rgba(255,255,255,0.2);
        }
        
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }
        
        #crosshair::before {
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            transform: translateY(-50%);
        }
        
        #crosshair::after {
            top: 0;
            bottom: 0;
            left: 50%;
            width: 2px;
            transform: translateX(-50%);
        }
        
        .instruction {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            z-index: 3;
            animation: fadeOut 4s forwards;
            font-size: 16px;
            white-space: nowrap;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        
        @media (max-width: 600px) {
            button { padding: 8px 14px; font-size: 12px; }
            #status { font-size: 11px; top: 10px; }
        }
        
        .distance-indicator {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 2;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <video id="video-background" autoplay playsinline muted></video>
    
    <div id="status">🎯 Starting AR... Please allow camera access</div>
    <div id="crosshair"></div>
    <div class="distance-indicator" id="distance">📍 Distance: --</div>
    
    <div id="controls">
        <button class="furniture-btn" data-type="chair">🪑 Chair</button>
        <button class="furniture-btn" data-type="table">📦 Table</button>
        <button class="furniture-btn" data-type="lamp">💡 Lamp</button>
        <button class="remove-btn" id="removeLast">🗑️ Remove</button>
        <button class="clear-btn" id="clearAll">🚮 Clear All</button>
    </div>
    
    <div class="instruction">
        📱 CAMERA ACTIVE!<br>
        👆 TAP anywhere to place furniture 1.5 meters in front of you<br>
        🪑 Move your phone to see furniture from different angles!
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // --- Setup Scene with Transparent Background ---
        const scene = new THREE.Scene();
        
        // Camera for 3D objects
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0); // Start at origin
        
        // Renderer with transparent background
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // --- Camera Feed ---
        const videoElement = document.getElementById('video-background');
        
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: 'environment' } }
                });
                videoElement.srcObject = stream;
                await videoElement.play();
                document.getElementById('status').innerHTML = '✅ Camera ready! TAP anywhere to place furniture';
                document.getElementById('status').style.background = 'rgba(0,100,0,0.8)';
                setTimeout(() => {
                    document.getElementById('status').style.background = 'rgba(0,0,0,0.8)';
                }, 2000);
            } catch (err) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    videoElement.srcObject = stream;
                    await videoElement.play();
                    document.getElementById('status').innerHTML = '✅ Camera ready! (using front camera)';
                } catch (err2) {
                    document.getElementById('status').innerHTML = '❌ Camera access denied. Please allow camera permissions and refresh.';
                    document.getElementById('status').style.background = 'rgba(255,0,0,0.8)';
                }
            }
        }
        
        startCamera();
        
        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(1, 2, 1);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const backLight = new THREE.PointLight(0x88aaff, 0.5);
        backLight.position.set(0, 1, -1);
        scene.add(backLight);
        
        // Helper: Add a subtle grid on the floor to see reference (optional)
        const gridHelper = new THREE.GridHelper(5, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.01;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);
        
        // --- Furniture Models (with better visibility) ---
        function createChair(x, z, color = 0xCD7F32) {
            const group = new THREE.Group();
            
            // Seat
            const seat = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 0.12, 0.6),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.1 })
            );
            seat.position.y = 0.06;
            seat.castShadow = true;
            seat.receiveShadow = true;
            group.add(seat);
            
            // Backrest
            const back = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 0.5, 0.1),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 })
            );
            back.position.set(0, 0.3, -0.3);
            back.castShadow = true;
            group.add(back);
            
            // Legs
            const legMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            [[-0.25, -0.02, -0.25], [0.25, -0.02, -0.25], [-0.25, -0.02, 0.25], [0.25, -0.02, 0.25]].forEach(pos => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.2, 6), legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                group.add(leg);
            });
            
            group.position.set(x, 0, z);
            return group;
        }
        
        function createTable(x, z, color = 0xC19A6B) {
            const group = new THREE.Group();
            
            const top = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.1, 0.8),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.2, metalness: 0.2 })
            );
            top.position.y = 0.4;
            top.castShadow = true;
            group.add(top);
            
            const legMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            [[-0.35, 0.2, -0.35], [0.35, 0.2, -0.35], [-0.35, 0.2, 0.35], [0.35, 0.2, 0.35]].forEach(pos => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.4, 6), legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                group.add(leg);
            });
            
            group.position.set(x, 0, z);
            return group;
        }
        
        function createLamp(x, z, color = 0xFFAA66) {
            const group = new THREE.Group();
            
            const base = new THREE.Mesh(
                new THREE.CylinderGeometry(0.22, 0.26, 0.1, 8),
                new THREE.MeshStandardMaterial({ color: 0xCCAA77, metalness: 0.6 })
            );
            base.position.y = 0.05;
            base.castShadow = true;
            group.add(base);
            
            const pole = new THREE.Mesh(
                new THREE.CylinderGeometry(0.08, 0.08, 0.6, 6),
                new THREE.MeshStandardMaterial({ color: 0xAA8866, metalness: 0.5 })
            );
            pole.position.y = 0.35;
            pole.castShadow = true;
            group.add(pole);
            
            const bulb = new THREE.Mesh(
                new THREE.SphereGeometry(0.14, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xFFDD88, emissive: 0xFF8800, emissiveIntensity: 0.6 })
            );
            bulb.position.y = 0.68;
            bulb.castShadow = true;
            group.add(bulb);
            
            group.position.set(x, 0, z);
            return group;
        }
        
        // Store furniture
        let furnitureItems = [];
        let currentType = 'chair';
        
        // --- Simple AR Placement: Place furniture at a fixed distance in front of camera ---
        function getPlacementPosition() {
            // Get camera's forward direction
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0; // Keep on ground plane
            forward.normalize();
            
            // Place at 1.5 meters in front, on ground level (y=0)
            const distance = 1.5;
            const position = camera.position.clone().add(forward.multiplyScalar(distance));
            position.y = 0; // Ground level
            
            return position;
        }
        
        function addFurniture() {
            const position = getPlacementPosition();
            
            let furniture;
            switch(currentType) {
                case 'chair':
                    furniture = createChair(position.x, position.z, 0xCD7F32);
                    break;
                case 'table':
                    furniture = createTable(position.x, position.z, 0xC19A6B);
                    break;
                case 'lamp':
                    furniture = createLamp(position.x, position.z, 0xFFAA66);
                    break;
                default:
                    furniture = createChair(position.x, position.z);
            }
            
            scene.add(furniture);
            
            // Add a floating label
            const labelDiv = document.createElement('div');
            labelDiv.textContent = currentType === 'chair' ? '🪑' : (currentType === 'table' ? '📦' : '💡');
            labelDiv.style.backgroundColor = 'rgba(0,0,0,0.7)';
            labelDiv.style.color = 'white';
            labelDiv.style.padding = '4px 10px';
            labelDiv.style.borderRadius = '20px';
            labelDiv.style.fontSize = '24px';
            labelDiv.style.border = '2px solid gold';
            labelDiv.style.position = 'absolute';
            labelDiv.style.pointerEvents = 'none';
            
            // Create CSS2D label manually
            const labelObj = new THREE.Object3D();
            labelObj.position.copy(position);
            labelObj.position.y += 0.5;
            scene.add(labelObj);
            
            furnitureItems.push({
                mesh: furniture,
                label: labelObj,
                type: currentType,
                position: position.clone()
            });
            
            document.getElementById('status').innerHTML = `✅ ${currentType.toUpperCase()} placed at ${position.x.toFixed(1)}m, ${position.z.toFixed(1)}m in front! (${furnitureItems.length} items)`;
            document.getElementById('status').style.background = 'rgba(0,100,0,0.8)';
            setTimeout(() => {
                document.getElementById('status').style.background = 'rgba(0,0,0,0.8)';
                document.getElementById('status').innerHTML = `🎯 TAP to place more ${currentType}s • ${furnitureItems.length} items total`;
            }, 2500);
            
            // Visual feedback: flash crosshair
            const crosshair = document.getElementById('crosshair');
            crosshair.style.border = '3px solid #4CAF50';
            crosshair.style.backgroundColor = 'rgba(76,175,80,0.3)';
            setTimeout(() => {
                crosshair.style.border = '2px solid white';
                crosshair.style.backgroundColor = 'rgba(255,255,255,0.2)';
            }, 200);
        }
        
        // --- Tap to Place ---
        function onTap(event) {
            // Don't place if tapping on buttons
            if (event.target && (event.target.tagName === 'BUTTON' || event.target.closest('button'))) {
                return;
            }
            
            addFurniture();
        }
        
        // Event listeners
        renderer.domElement.addEventListener('click', onTap);
        renderer.domElement.addEventListener('touchstart', onTap, { passive: false });
        
        // Button controls
        document.querySelectorAll('.furniture-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                currentType = btn.dataset.type;
                document.querySelectorAll('.furniture-btn').forEach(b => b.style.opacity = '0.6');
                btn.style.opacity = '1';
                document.getElementById('status').innerHTML = `✨ Selected: ${currentType.toUpperCase()} • TAP to place`;
                setTimeout(() => {
                    if (document.getElementById('status').innerHTML.includes('Selected')) {
                        document.getElementById('status').innerHTML = `🎯 TAP to place ${currentType} • ${furnitureItems.length} items`;
                    }
                }, 1500);
            });
        });
        
        document.getElementById('removeLast').addEventListener('click', (e) => {
            e.stopPropagation();
            if (furnitureItems.length === 0) return;
            const last = furnitureItems.pop();
            scene.remove(last.mesh);
            if (last.label) scene.remove(last.label);
            document.getElementById('status').innerHTML = `🗑️ Removed last ${last.type} • ${furnitureItems.length} left`;
        });
        
        document.getElementById('clearAll').addEventListener('click', (e) => {
            e.stopPropagation();
            furnitureItems.forEach(item => {
                scene.remove(item.mesh);
                if (item.label) scene.remove(item.label);
            });
            furnitureItems = [];
            document.getElementById('status').innerHTML = `🧹 All furniture cleared!`;
        });
        
        // --- Device Orientation for AR Movement ---
        let deviceOrientationAvailable = false;
        
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (event) => {
                if (event.alpha !== null && !deviceOrientationAvailable) {
                    deviceOrientationAvailable = true;
                    document.getElementById('status').innerHTML = `🎯 Move your phone to look around! TAP to place furniture`;
                }
                
                // Rotate camera based on device orientation
                if (event.gamma !== null && event.beta !== null) {
                    // Gamma: left/right tilt (-90 to 90)
                    // Beta: front/back tilt (-90 to 90)
                    const gamma = Math.min(Math.max(event.gamma, -70), 70);
                    const beta = Math.min(Math.max(event.beta, -70), 70);
                    
                    camera.rotation.order = 'YXZ';
                    camera.rotation.y = (gamma / 180) * Math.PI;
                    camera.rotation.x = (beta / 180) * Math.PI;
                }
            });
        }
        
        // Position camera at human height
        camera.position.set(0, 1.6, 0);
        
        // Update distance indicator
        function updateDistance() {
            if (furnitureItems.length > 0) {
                const lastItem = furnitureItems[furnitureItems.length - 1];
                const distance = Math.sqrt(
                    Math.pow(lastItem.position.x - camera.position.x, 2) + 
                    Math.pow(lastItem.position.z - camera.position.z, 2)
                );
                document.getElementById('distance').innerHTML = `📏 Last item: ${distance.toFixed(1)}m away`;
            } else {
                document.getElementById('distance').innerHTML = `📍 TAP to place furniture`;
            }
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
            updateDistance();
        }
        animate();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Add a demo furniture after 3 seconds
        setTimeout(() => {
            if (furnitureItems.length === 0) {
                const demoChair = createChair(0, 1.2, 0xCD7F32);
                scene.add(demoChair);
                furnitureItems.push({
                    mesh: demoChair,
                    label: null,
                    type: 'chair',
                    position: new THREE.Vector3(0, 0, 1.2)
                });
                document.getElementById('status').innerHTML = `🎯 Demo chair placed 1.2m in front! TAP to add more furniture`;
                document.getElementById('status').style.background = 'rgba(0,100,0,0.8)';
                setTimeout(() => {
                    document.getElementById('status').style.background = 'rgba(0,0,0,0.8)';
                }, 3000);
            }
        }, 3000);
        
        console.log('AR App Ready - Furniture will appear in front of you!');
        console.log('Camera position:', camera.position);
    </script>
</body>
</html>
