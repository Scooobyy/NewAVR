<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TRUE AR - Furniture Stays in Real World</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: block;
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 2;
            padding: 12px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .furniture-btn {
            background: #4CAF50;
            color: white;
        }
        
        .clear-btn {
            background: #f44336;
            color: white;
        }
        
        .remove-btn {
            background: #ff9800;
            color: white;
        }
        
        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            color: #ffd700;
            padding: 12px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 2;
            text-align: center;
            backdrop-filter: blur(5px);
            pointer-events: none;
            font-weight: bold;
        }
        
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            transform: translate(-50%, -50%);
            border: 3px solid #ffd700;
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            background: rgba(255,215,0,0.2);
        }
        
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: #ffd700;
        }
        
        #crosshair::before {
            top: 50%;
            left: 10%;
            right: 10%;
            height: 2px;
            transform: translateY(-50%);
        }
        
        #crosshair::after {
            top: 10%;
            bottom: 10%;
            left: 50%;
            width: 2px;
            transform: translateX(-50%);
        }
        
        .debug-info {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 8px;
            border-radius: 10px;
            font-size: 11px;
            font-family: monospace;
            z-index: 2;
            pointer-events: none;
            text-align: center;
        }
        
        @media (max-width: 600px) {
            button { padding: 8px 14px; font-size: 12px; }
            .debug-info { font-size: 9px; bottom: 90px; }
        }
    </style>
</head>
<body>
    <video id="video-background" autoplay playsinline muted></video>
    
    <div id="status">🎯 Move phone SLOWLY to initialize AR tracking...</div>
    <div id="crosshair"></div>
    <div class="debug-info" id="debug">📍 Initializing AR tracking...</div>
    
    <div id="controls">
        <button class="furniture-btn" data-type="chair">🪑 Chair</button>
        <button class="furniture-btn" data-type="table">📦 Table</button>
        <button class="furniture-btn" data-type="lamp">💡 Lamp</button>
        <button class="remove-btn" id="removeLast">🗑️ Remove</button>
        <button class="clear-btn" id="clearAll">🚮 Clear All</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // --- Setup Scene ---
        const scene = new THREE.Scene();
        
        // Camera for 3D objects (will track device motion)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);
        
        // Renderer with transparent background
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // --- Camera Feed ---
        const videoElement = document.getElementById('video-background');
        
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: 'environment' } }
                });
                videoElement.srcObject = stream;
                await videoElement.play();
                document.getElementById('status').innerHTML = '✅ AR Ready! Move phone SLOWLY to place furniture in REAL WORLD';
            } catch (err) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    videoElement.srcObject = stream;
                    await videoElement.play();
                    document.getElementById('status').innerHTML = '✅ AR Ready! (using front camera)';
                } catch (err2) {
                    document.getElementById('status').innerHTML = '❌ Camera access denied';
                }
            }
        }
        
        startCamera();
        
        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 3, 2);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const backLight = new THREE.PointLight(0x88aaff, 0.5);
        backLight.position.set(0, 1, -1);
        scene.add(backLight);
        
        // --- Furniture Models ---
        function createChair(x, z, color = 0xCD7F32) {
            const group = new THREE.Group();
            
            const seatMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 });
            const seat = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.12, 0.6), seatMat);
            seat.position.y = 0.06;
            seat.castShadow = true;
            group.add(seat);
            
            const back = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.1), seatMat);
            back.position.set(0, 0.3, -0.3);
            back.castShadow = true;
            group.add(back);
            
            const legMat = new THREE.MeshStandardMaterial({ color: 0x5D3A1A });
            [[-0.25, -0.02, -0.25], [0.25, -0.02, -0.25], [-0.25, -0.02, 0.25], [0.25, -0.02, 0.25]].forEach(pos => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.2, 6), legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                group.add(leg);
            });
            
            group.position.set(x, 0, z);
            return group;
        }
        
        function createTable(x, z, color = 0xC19A6B) {
            const group = new THREE.Group();
            
            const top = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.8), 
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.2 }));
            top.position.y = 0.4;
            top.castShadow = true;
            group.add(top);
            
            const legMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
            [[-0.35, 0.2, -0.35], [0.35, 0.2, -0.35], [-0.35, 0.2, 0.35], [0.35, 0.2, 0.35]].forEach(pos => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.4, 6), legMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                group.add(leg);
            });
            
            group.position.set(x, 0, z);
            return group;
        }
        
        function createLamp(x, z, color = 0xFFAA66) {
            const group = new THREE.Group();
            
            const base = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.26, 0.1, 8),
                new THREE.MeshStandardMaterial({ color: 0xCCAA77, metalness: 0.6 }));
            base.position.y = 0.05;
            base.castShadow = true;
            group.add(base);
            
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6, 6),
                new THREE.MeshStandardMaterial({ color: 0xAA8866, metalness: 0.5 }));
            pole.position.y = 0.35;
            pole.castShadow = true;
            group.add(pole);
            
            const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.14, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xFFDD88, emissive: 0xFF8800, emissiveIntensity: 0.6 }));
            bulb.position.y = 0.68;
            bulb.castShadow = true;
            group.add(bulb);
            
            group.position.set(x, 0, z);
            return group;
        }
        
        // Store furniture with their REAL WORLD positions
        let furnitureItems = [];
        let currentType = 'chair';
        
        // --- AR TRACKING: Store the initial reference point ---
        let isTracking = false;
        let initialCameraRotation = null;
        let initialDeviceOrientation = null;
        
        // This stores the real-world position of the camera when first placed
        let worldOrigin = new THREE.Vector3(0, 1.6, 0);
        let worldRotation = 0;
        
        // Function to place furniture in REAL WORLD position (relative to initial point)
        function placeFurnitureAtRealWorldPosition(forwardDistance, rightOffset = 0) {
            // Calculate position relative to where you're standing
            // forwardDistance: how far in front of you (meters)
            // rightOffset: how far to the right (meters)
            
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyQuaternion(camera.quaternion);
            forward.y = 0;
            forward.normalize();
            
            const right = new THREE.Vector3(1, 0, 0);
            right.applyQuaternion(camera.quaternion);
            right.y = 0;
            right.normalize();
            
            // Position in front of camera
            const position = camera.position.clone().add(forward.multiplyScalar(forwardDistance));
            position.add(right.multiplyScalar(rightOffset));
            position.y = 0;
            
            return position;
        }
        
        // Place furniture at current camera view (where crosshair points)
        function placeFurniture() {
            // Place furniture 1.8 meters in front of current camera position
            const position = placeFurnitureAtRealWorldPosition(1.8, 0);
            
            let furniture;
            switch(currentType) {
                case 'chair': furniture = createChair(position.x, position.z, 0xCD7F32); break;
                case 'table': furniture = createTable(position.x, position.z, 0xC19A6B); break;
                case 'lamp': furniture = createLamp(position.x, position.z, 0xFFAA66); break;
                default: furniture = createChair(position.x, position.z);
            }
            
            scene.add(furniture);
            
            // Add a ground ring for better visibility
            const ringGeo = new THREE.RingGeometry(0.4, 0.55, 16);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff4400, emissiveIntensity: 0.4, side: THREE.DoubleSide });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = 0.02;
            furniture.add(ring);
            
            furnitureItems.push({
                mesh: furniture,
                type: currentType,
                position: position.clone()
            });
            
            document.getElementById('status').innerHTML = `✅ ${currentType.toUpperCase()} placed in REAL WORLD at ${position.x.toFixed(1)}m, ${position.z.toFixed(1)}m!`;
            document.getElementById('debug').innerHTML = `📍 Furniture anchored in real world! Move around to see it stay in place. Total: ${furnitureItems.length}`;
            
            setTimeout(() => {
                document.getElementById('status').innerHTML = `🎯 Move around! Furniture stays in REAL WORLD position • ${furnitureItems.length} items`;
            }, 3000);
            
            // Flash feedback
            const crosshair = document.getElementById('crosshair');
            crosshair.style.border = '3px solid #4CAF50';
            crosshair.style.transform = 'translate(-50%, -50%) scale(1.2)';
            setTimeout(() => {
                crosshair.style.border = '3px solid #ffd700';
                crosshair.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 200);
        }
        
        // --- AR Movement Tracking: Furniture stays in REAL WORLD ---
        // We need to track device movement so furniture doesn't move with camera
        
        let deviceRotationX = 0;
        let deviceRotationY = 0;
        let initialGamma = null;
        let initialBeta = null;
        
        // Store furniture positions relative to world origin
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (event) => {
                if (event.gamma !== null && event.beta !== null) {
                    // Set initial reference point on first reading
                    if (initialGamma === null) {
                        initialGamma = event.gamma;
                        initialBeta = event.beta;
                        document.getElementById('debug').innerHTML = `🎯 AR Tracking ACTIVE! Move phone, furniture will stay in place!`;
                        document.getElementById('status').innerHTML = `✅ AR Active! TAP to place furniture in REAL WORLD`;
                    }
                    
                    // Calculate relative rotation from initial position
                    let gamma = event.gamma - initialGamma;
                    let beta = event.beta - initialBeta;
                    
                    // Apply rotation to camera (this creates the AR effect)
                    deviceRotationY = Math.min(Math.max(gamma, -60), 60);
                    deviceRotationX = Math.min(Math.max(beta, -60), 60);
                    
                    camera.rotation.order = 'YXZ';
                    camera.rotation.y = (deviceRotationY / 180) * Math.PI;
                    camera.rotation.x = (deviceRotationX / 180) * Math.PI;
                    
                    // Update debug
                    document.getElementById('debug').innerHTML = `📍 AR Tracking | Furniture: ${furnitureItems.length} items | Move phone to look around`;
                }
            });
        }
        
        // Tap to place furniture
        function onTap(event) {
            if (event.target && (event.target.tagName === 'BUTTON' || event.target.closest('button'))) {
                return;
            }
            placeFurniture();
        }
        
        renderer.domElement.addEventListener('click', onTap);
        renderer.domElement.addEventListener('touchstart', onTap, { passive: false });
        
        // Button controls
        document.querySelectorAll('.furniture-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                currentType = btn.dataset.type;
                document.querySelectorAll('.furniture-btn').forEach(b => b.style.opacity = '0.6');
                btn.style.opacity = '1';
                document.getElementById('status').innerHTML = `✨ Selected: ${currentType.toUpperCase()} • TAP to place in real world`;
            });
        });
        
        document.getElementById('removeLast').addEventListener('click', (e) => {
            e.stopPropagation();
            if (furnitureItems.length === 0) return;
            const last = furnitureItems.pop();
            scene.remove(last.mesh);
            document.getElementById('status').innerHTML = `🗑️ Removed last ${last.type} • ${furnitureItems.length} left`;
        });
        
        document.getElementById('clearAll').addEventListener('click', (e) => {
            e.stopPropagation();
            furnitureItems.forEach(item => scene.remove(item.mesh));
            furnitureItems = [];
            document.getElementById('status').innerHTML = `🧹 All furniture cleared!`;
        });
        
        // Add a visual indicator of where furniture will appear
        const indicatorRing = new THREE.Mesh(
            new THREE.RingGeometry(0.3, 0.45, 16),
            new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff6600, transparent: true, opacity: 0.6, side: THREE.DoubleSide })
        );
        indicatorRing.rotation.x = -Math.PI / 2;
        scene.add(indicatorRing);
        
        // Update indicator position
        function updateIndicator() {
            const pos = placeFurnitureAtRealWorldPosition(1.6, 0);
            indicatorRing.position.copy(pos);
            indicatorRing.position.y = 0.02;
        }
        
        // Demo: Place a starting furniture after 2 seconds
        setTimeout(() => {
            if (furnitureItems.length === 0) {
                const startPos = placeFurnitureAtRealWorldPosition(1.5, 0);
                const demoChair = createChair(startPos.x, startPos.z, 0xCD7F32);
                scene.add(demoChair);
                
                const ringGeo = new THREE.RingGeometry(0.4, 0.55, 16);
                const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff4400, emissiveIntensity: 0.4, side: THREE.DoubleSide });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = -Math.PI / 2;
                ring.position.y = 0.02;
                demoChair.add(ring);
                
                furnitureItems.push({
                    mesh: demoChair,
                    type: 'chair',
                    position: startPos.clone()
                });
                
                document.getElementById('status').innerHTML = `🎉 DEMO CHAIR PLACED! Move your phone around - the chair stays in REAL WORLD position!`;
                document.getElementById('debug').innerHTML = `✅ Demo chair anchored at ${startPos.x.toFixed(1)}m, ${startPos.z.toFixed(1)}m`;
                
                setTimeout(() => {
                    document.getElementById('status').innerHTML = `🎯 TAP to place more furniture in your REAL ROOM! • ${furnitureItems.length} items`;
                }, 5000);
            }
        }, 2000);
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            updateIndicator();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('TRUE AR App - Furniture stays in real world positions!');
    </script>
</body>
</html>
